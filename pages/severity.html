<div class="card">
  <div class="card-title">ระดับความรุนแรง — Clinical Risk & Personnel Safety Goals (A–I)</div>
  <div class="card-sub">อ้างอิงคู่มือ รพ.มหาราชนครราชสีมา ปี 2567</div>
  <div id="sev-clinic"></div>
</div>
<div class="card">
  <div class="card-title">ระดับความรุนแรง — Non-Clinic / Organization Safety Goals (1–5)</div>
  <div id="sev-nc" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:8px;"></div>
</div>
<div class="card">
  <div class="card-title">ระดับโอกาสเกิด (Likelihood) — อ้างอิง สรพ. / ISO 31000</div>
  <div id="sev-lk"></div>
</div>
<script>
window.initSeverity=function(){
  const clinic=[
    {lv:"A",name:"เกิดที่นี่",impact:"เกิดจากตัวเอง ค้นพบและแก้ไขได้เอง ไม่ส่งผลกระทบถึงผู้อื่น",sev:"น้อย",bg:"#E8F5EE",col:"#1A5E2A"},
    {lv:"B",name:"เกิดที่ไกล",impact:"ส่งต่อให้ผู้อื่น แต่ตรวจพบและแก้ไขได้ ไม่มีผลกระทบถึงผู้ป่วย",sev:"น้อย",bg:"#E8F5EE",col:"#1A5E2A"},
    {lv:"C",name:"เกิดกับใคร",impact:"มีผลกระทบถึงผู้ป่วย แต่ไม่เกิดอันตรายหรือเสียหาย",sev:"น้อย",bg:"#EAF3DE",col:"#27500A"},
    {lv:"D",name:"ให้ระวัง",impact:"มีผลกระทบถึงผู้ป่วย ต้องเฝ้าระวังพิเศษ",sev:"ปานกลาง",bg:"#FFF8E1",col:"#7B5C00"},
    {lv:"E",name:"ต้องรักษา",impact:"เกิดอันตรายชั่วคราว ต้องแก้ไข/รักษาเพิ่มมากขึ้น",sev:"ปานกลาง",bg:"#FFF8E1",col:"#7B5C00"},
    {lv:"F",name:"เยียวยานาน",impact:"ต้องใช้เวลาแก้ไขนานกว่าปกติ ผู้ป่วยนอน รพ. นานขึ้น",sev:"ปานกลาง",bg:"#FFF8E1",col:"#7B5C00"},
    {lv:"G",name:"ต้องพิการ",impact:"ความพิการถาวร หรือเสียชื่อเสียง/มีการร้องเรียน",sev:"มาก",bg:"#FFEBEB",col:"#8B0000"},
    {lv:"H",name:"ต้องการปั๊ม",impact:"ต้องช่วยชีวิต หรือมีการเรียกร้องค่าเสียหายจาก รพ.",sev:"มาก",bg:"#FFEBEB",col:"#8B0000"},
    {lv:"I",name:"จำใจลา",impact:"เสียชีวิต เสียชื่อเสียง มีการฟ้องร้องทางศาล/สื่อ",sev:"มาก",bg:"#FFEBEB",col:"#8B0000"},
  ];
  document.getElementById("sev-clinic").innerHTML=clinic.map(c=>`
    <div class="sev-row">
      <div class="sev-num" style="background:${c.bg};color:${c.col};border-right:1px solid #eee;">${c.lv}</div>
      <div class="sev-body">
        <div class="sev-label" style="color:${c.col};">${c.name}</div>
        <div class="sev-desc">${c.impact}</div>
        <span class="sev-equiv" style="background:${c.bg};color:${c.col};">ความรุนแรง: ${c.sev}</span>
      </div>
    </div>`).join("");

  const nc=[
    {n:1,label:"น้อย",note:"0–10,000 บ.",bg:"#E8F5EE",col:"#1A5E2A"},
    {n:2,label:"พอรับได้",note:"10–50K บ.",bg:"#EAF3DE",col:"#27500A"},
    {n:3,label:"ปานกลาง",note:"50–250K บ.",bg:"#FFF8E1",col:"#7B5C00"},
    {n:4,label:"มาก",note:"250K–10M บ.",bg:"#FFF0E6",col:"#8B3A0A"},
    {n:5,label:"วิกฤต",note:">10 ล้าน บ.",bg:"#FFEBEB",col:"#8B0000"},
  ];
  document.getElementById("sev-nc").innerHTML=nc.map(c=>`
    <div style="padding:12px;background:${c.bg};border-radius:8px;text-align:center;">
      <div style="font-size:22px;font-weight:700;color:${c.col};">${c.n}</div>
      <div style="font-size:12px;font-weight:700;color:${c.col};">${c.label}</div>
      <div style="font-size:11px;color:${c.col};margin-top:2px;">${c.note}</div>
    </div>`).join("");

  const lk=[
    {l:1,label:"Remote",th:"แทบไม่เกิด",freq:"<1 ครั้ง/ปี",bg:"#E8F5EE",col:"#1A5E2A"},
    {l:2,label:"Unlikely",th:"ไม่ค่อยเกิด",freq:"1–2 ครั้ง/ปี",bg:"#EAF3DE",col:"#27500A"},
    {l:3,label:"Possible",th:"อาจเกิด",freq:"3–6 ครั้ง/ปี",bg:"#FFF8E1",col:"#7B5C00"},
    {l:4,label:"Likely",th:"มีโอกาสสูง",freq:"7–11 ครั้ง/ปี",bg:"#FFF0E6",col:"#8B3A0A"},
    {l:5,label:"Almost Certain",th:"แน่นอน",freq:"≥12 ครั้ง/ปี",bg:"#FFEBEB",col:"#8B0000"},
  ];
  document.getElementById("sev-lk").innerHTML=lk.map(c=>`
    <div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #eee;">
      <div style="width:32px;height:32px;border-radius:50%;background:${c.bg};color:${c.col};display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;">${c.l}</div>
      <div style="min-width:140px;font-weight:600;color:${c.col};">${c.label} — ${c.th}</div>
      <div style="font-size:12px;color:#666;flex:1;">ความถี่: ${c.freq}</div>
    </div>`).join("");
};
initSeverity();
</script>
