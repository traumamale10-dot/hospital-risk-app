<div class="card">
  <div class="card-title">นโยบายความปลอดภัยผู้ป่วย — อุบัติการณ์เป็นศูนย์ (Zero Event)</div>
  <div class="card-sub">โรงพยาบาลมหาราชนครราชสีมา ประกาศนโยบายป้องกันความเสี่ยง ให้มีอุบัติการณ์เป็นศูนย์ได้แก่</div>
  <div id="zero-list" style="margin-top:8px;"></div>
</div>
<div class="card">
  <div class="card-title">มาตรฐานสำคัญจำเป็นต่อความปลอดภัย (9 ข้อ)</div>
  <div class="card-sub">คัดลอกจาก Patient Safety & Personnel Safety 2018 — ใช้ประกอบการรับรองคุณภาพ HA / Advance HA</div>
  <div id="std-list" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin-top:8px;"></div>
</div>
<script>
window.initZero=function(){
  const zeros=["การผ่าตัดผิดคน ผิดข้าง ผิดตำแหน่ง ผิดหัตถการ","การลืมสิ่งของค้างไว้ในตัวผู้ป่วย","การให้เลือดผิดคน ผิดหมู่ ผิดชนิด","การส่งมอบทารกแรกเกิดให้มารดาผิดคน และการลักขโมยทารกแรกเกิด"];
  document.getElementById("zero-list").innerHTML=zeros.map((z,i)=>`
    <div class="zero-item">
      <div class="zero-num">${i+1}</div>
      <span style="font-size:13px;">${z}</span>
    </div>`).join("");

  const stds=["การผ่าตัดผิดคน ผิดข้าง ผิดตำแหน่ง ผิดหัตถการ","การติดเชื้อสำคัญ SSI, VAP, CAUTI, CABSI","บุคลากรติดเชื้อจากการปฏิบัติหน้าที่","Medication Errors และ Adverse Drug Event","การให้เลือดผิดคน ผิดหมู่ ผิดชนิด","การระบุตัวผู้ป่วยผิดพลาด","ความคลาดเคลื่อนในการวินิจฉัยโรค","การรายงานผลตรวจห้องปฏิบัติการคลาดเคลื่อน","การคัดกรองที่ห้องฉุกเฉินคลาดเคลื่อน"];
  document.getElementById("std-list").innerHTML=stds.map((s,i)=>`
    <div style="padding:8px 10px;background:#f8f9fa;border-radius:6px;font-size:12px;color:#444;border-left:3px solid #A32D2D;">
      <strong style="color:#A32D2D;">${i+1}.</strong> ${s}
    </div>`).join("");
};
initZero();
</script>
