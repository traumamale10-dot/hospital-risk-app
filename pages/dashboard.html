<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div>
      <div class="card-title" style="margin-bottom:2px;">Dashboard — ภาพรวมความเสี่ยง</div>
      <div class="card-sub" style="margin-bottom:0;">กลุ่มภารกิจด้านการพยาบาล รพ.มหาราชนครราชสีมา</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="dash-status" style="font-size:11px;color:#888;display:none;"></span>
      <button onclick="initDashboard()" style="font-size:12px;padding:5px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;">↺ รีเฟรช</button>
    </div>
  </div>
</div>

<div class="grid-4" style="margin-bottom:16px;">
  <div class="card" style="margin-bottom:0;text-align:center;" id="kpi-total"></div>
  <div class="card" style="margin-bottom:0;text-align:center;border-top:3px solid #D4621A;" id="kpi-high"></div>
  <div class="card" style="margin-bottom:0;text-align:center;border-top:3px solid #B22222;" id="kpi-sentinel"></div>
  <div class="card" style="margin-bottom:0;text-align:center;border-top:3px solid #C9A227;" id="kpi-pending"></div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">อุบัติการณ์ตามประเภท (30 วัน)</div>
    <canvas id="chart-type" height="200"></canvas>
  </div>
  <div class="card">
    <div class="card-title">จำนวนตามระดับความเสี่ยง</div>
    <canvas id="chart-level" height="200"></canvas>
  </div>
</div>

<div class="card">
  <div class="card-title">แนวโน้มอุบัติการณ์รายสัปดาห์</div>
  <canvas id="chart-trend" height="120"></canvas>
</div>

<div class="card">
  <div class="card-title">5 อันดับอุบัติการณ์สูงสุด</div>
  <div id="top-incidents"></div>
</div>

<div style="font-size:11px;color:#aaa;text-align:center;margin-top:8px;">
  ⚠ ข้อมูล Demo — เชื่อม Google Sheets แล้วกด "รีเฟรช" เพื่อดูข้อมูลจริง
</div>
<script>if(typeof initDashboard==="function")initDashboard();</script>
